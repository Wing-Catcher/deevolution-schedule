<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jadwal Sekolah</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Google+Sans+Display:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Memuat jadwal...</div>
</div>

<!-- Top App Bar -->
<div class="top-bar">
  <div class="top-bar-header">
    <div class="top-bar-icon">
      <span class="material-icons-round">calendar_month</span>
    </div>
    <div>
      <div class="top-bar-title" id="titleText">Jadwal Sekolah</div>
      <div class="top-bar-subtitle" id="subtitleText">Memuat...</div>
    </div>
    <div class="top-bar-actions">
      <button class="icon-btn" id="btnLoad" title="Muat XML">
        <span class="material-icons-round">upload_file</span>
      </button>
      <button class="icon-btn" id="btnEditor" title="Buka Editor">
        <span class="material-icons-round">edit_note</span>
      </button>
    </div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</div>

<!-- Live Clock -->
<div class="clock-wrap">
  <div class="clock-card">
    <div class="clock-top">
      <div>
        <div class="clock-time" id="clockTime">00:00<span class="clock-seconds" id="clockSec">:00</span></div>
        <div class="clock-date" id="clockDate">—</div>
      </div>
      <div style="text-align:right;">
        <div class="clock-now-label">Sekarang</div>
        <div class="clock-now-pill">
          <div id="clockNowMain">—</div>
          <div class="clock-now-sub" id="clockNowSub"></div>
        </div>
      </div>
    </div>
    <div class="clock-divider"></div>
    <div class="clock-progress-row">
      <div class="clock-progress-bar">
        <div class="clock-progress-fill" id="clockFill"></div>
      </div>
      <div class="clock-progress-label" id="clockProgressLabel">—</div>
    </div>
  </div>
</div>

<!-- Slider Content -->
<div class="content">
  <div class="days-slider" id="daysSlider"></div>
</div>

<!-- Legend -->
<div class="legend-wrap">
  <div class="legend-section">
    <div class="legend-title">
      <span class="material-icons-round">palette</span>
      Keterangan Warna Mapel
    </div>
    <div class="legend-grid" id="legendGrid"></div>
  </div>
</div>

<!-- FAB -->
<button class="bottom-fab" id="btnToday">
  <span class="material-icons-round">today</span>
  Hari Ini
</button>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".xml" style="display:none">

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
